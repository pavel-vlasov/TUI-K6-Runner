name: Coverage

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  coverage:
    name: Coverage report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Coverage
        run: |
          PYTHONPATH=. pytest --cov=. --cov-config=.coveragerc --cov-fail-under=80 --cov-report=xml:coverage.xml --cov-report=term-missing

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          if-no-files-found: warn
          path: coverage.xml
