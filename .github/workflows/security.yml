name: Security

on:
  workflow_dispatch:

jobs:
  dependency-audit:
    name: Dependency audit (runtime + dev)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Dependency check (runtime)
        run: |
          pip-audit --require-hashes -r requirements.txt 2>&1 | tee security-runtime-report.txt

      - name: Dependency check (dev)
        run: |
          pip-audit --require-hashes -r requirements-dev.txt 2>&1 | tee security-dev-report.txt

      - name: Upload security report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          if-no-files-found: warn
          path: |
            security-runtime-report.txt
            security-dev-report.txt
