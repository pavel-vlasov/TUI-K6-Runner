name: Security

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  dependency-audit:
    name: Dependency audit (runtime + dev)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Dependency check (runtime)
        run: |
          pip-audit --require-hashes -r requirements.txt

      - name: Dependency check (dev)
        run: |
          pip-audit --require-hashes -r requirements-dev.txt
