name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    name: Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve pip cache directory
        id: pip-cache-dir
        shell: bash
        run: |
          echo "dir=$(python -m pip cache dir)" >> "$GITHUB_OUTPUT"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ${{ steps.pip-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run smoke tests (process control)
        run: |
          PYTHONPATH=. pytest -q tests/test_process_manager.py tests/test_k6_service.py

  lint:
    name: Lint
    needs: smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff lint
        run: |
          ruff check .

  unit-tests:
    name: Unit tests + Coverage
    needs: smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          PYTHONPATH=. pytest \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --junitxml=pytest-report.xml

      - name: Upload test & coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          if-no-files-found: warn
          path: |
            pytest-report.xml
            coverage.xml

  dependency-check:
    name: Dependency status
    needs: smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies and audit tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit

      - name: Security audit dependencies
        run: |
          pip-audit

  build:
    name: Compile + Bundle
    needs:
      - lint
      - unit-tests
      - dependency-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile check
        run: |
          python -m compileall -q .

      - name: Build source bundle
        run: |
          python - <<'PY'
          from pathlib import Path
          import zipfile

          project_root = Path('.')
          dist_dir = project_root / 'dist'
          dist_dir.mkdir(parents=True, exist_ok=True)
          bundle_path = dist_dir / 'tui-k6-runner-source.zip'

          include_suffixes = {'.py', '.tcss', '.md', '.txt', '.js', '.yml'}
          excluded_parts = {'.git', '.pytest_cache', '__pycache__', '.ruff_cache', 'dist'}

          with zipfile.ZipFile(bundle_path, 'w', compression=zipfile.ZIP_DEFLATED) as bundle:
              for path in project_root.rglob('*'):
                  if not path.is_file():
                      continue
                  if any(part in excluded_parts for part in path.parts):
                      continue
                  if path.suffix.lower() not in include_suffixes:
                      continue
                  bundle.write(path, arcname=path.as_posix())

          print(f'Built source bundle: {bundle_path}')
          PY

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: source-bundle
          path: dist/tui-k6-runner-source.zip
