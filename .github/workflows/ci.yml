name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check .

      - name: Run tests with coverage
        id: pytest
        continue-on-error: true
        run: |
          set -o pipefail
          PYTHONPATH=. pytest \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --junitxml=pytest-report.xml | tee pytest-output.txt

      - name: Build job summary (tests + coverage)
        if: always()
        env:
          SUMMARY_FILE: ${{ env.GITHUB_STEP_SUMMARY }}
        run: |
          python - <<'PY'
          import os
          import xml.etree.ElementTree as ET
          from pathlib import Path

          summary_file = os.environ.get("GITHUB_STEP_SUMMARY") or os.environ.get("SUMMARY_FILE")
          if not summary_file:
              raise SystemExit(0)

          summary_path = Path(summary_file)
          report = Path("pytest-report.xml")
          coverage_report = Path("coverage.xml")

          lines = ["## Test summary", ""]

          if report.exists():
              root = ET.parse(report).getroot()
              suites = [root] if root.tag == "testsuite" else root.findall("testsuite")

              total = failures = errors = skipped = 0
              failed_items = []

              for suite in suites:
                  total += int(suite.attrib.get("tests", 0))
                  failures += int(suite.attrib.get("failures", 0))
                  errors += int(suite.attrib.get("errors", 0))
                  skipped += int(suite.attrib.get("skipped", 0))

                  for case in suite.findall("testcase"):
                      node = case.find("failure") or case.find("error")
                      if node is None:
                          continue
                      name = f"{case.attrib.get('classname', '')}::{case.attrib.get('name', '')}".strip(":")
                      text = (node.text or node.attrib.get("message") or "No details provided.").strip()
                      failed_items.append((name, text))

              passed = total - failures - errors - skipped

              lines.extend(
                  [
                      f"- ✅ Passed: **{passed}**",
                      f"- ❌ Failed: **{failures}**",
                      f"- 💥 Errors: **{errors}**",
                      f"- ⏭️ Skipped: **{skipped}**",
                      f"- 🔢 Total: **{total}**",
                  ]
              )

              if failed_items:
                  lines.extend(["", "### Failed test details", ""])
                  for name, text in failed_items:
                      clipped = text[:4000]
                      lines.extend(
                          [
                              f"<details><summary><code>{name}</code></summary>",
                              "",
                              "```text",
                              clipped,
                              "```",
                              "</details>",
                              "",
                          ]
                      )
          else:
              lines.append("⚠️ `pytest-report.xml` was not generated.")

          lines.extend(["", "## Coverage summary", ""])
          if coverage_report.exists():
              cov_root = ET.parse(coverage_report).getroot()
              line_rate = float(cov_root.attrib.get("line-rate", 0.0)) * 100
              branch_rate = float(cov_root.attrib.get("branch-rate", 0.0)) * 100
              lines.append(f"- 📊 Line coverage: **{line_rate:.2f}%**")
              lines.append(f"- 🌿 Branch coverage: **{branch_rate:.2f}%**")
          else:
              lines.append("⚠️ `coverage.xml` was not generated.")

          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          print(f"Job summary written to {summary_path}")
          PY

      - name: Upload pytest artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: |
            pytest-report.xml
            pytest-output.txt
            coverage.xml

      - name: Fail job when tests failed
        if: steps.pytest.outcome == 'failure'
        run: |
          echo "Pytest reported failures. See summary and artifacts above."
          exit 1
