name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    name: Quality Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit

      - name: Smoke tests
        id: smoke
        continue-on-error: true
        run: |
          PYTHONPATH=. pytest -q tests/test_process_manager.py tests/test_k6_service.py

      - name: Lint
        id: lint
        continue-on-error: true
        run: |
          ruff check .

      - name: Unit tests
        id: unit_tests
        continue-on-error: true
        run: |
          PYTHONPATH=. pytest -q

      - name: Coverage
        id: coverage
        continue-on-error: true
        run: |
          PYTHONPATH=. pytest --cov=. --cov-report=xml:coverage.xml --cov-report=term-missing

      - name: Dependency check
        id: dependency
        continue-on-error: true
        run: |
          pip-audit

      - name: Test report
        id: test_report
        continue-on-error: true
        run: |
          PYTHONPATH=. pytest --junitxml=pytest-report.xml

      - name: Build source bundle
        run: |
          python - <<'PY'
          from pathlib import Path
          import zipfile

          project_root = Path('.')
          dist_dir = project_root / 'dist'
          dist_dir.mkdir(parents=True, exist_ok=True)
          bundle_path = dist_dir / 'tui-k6-runner-source.zip'

          include_suffixes = {'.py', '.tcss', '.md', '.txt', '.js', '.yml'}
          excluded_parts = {'.git', '.pytest_cache', '__pycache__', '.ruff_cache', 'dist'}

          with zipfile.ZipFile(bundle_path, 'w', compression=zipfile.ZIP_DEFLATED) as bundle:
              for path in project_root.rglob('*'):
                  if not path.is_file():
                      continue
                  if any(part in excluded_parts for part in path.parts):
                      continue
                  if path.suffix.lower() not in include_suffixes:
                      continue
                  bundle.write(path, arcname=path.as_posix())

          print(f'Built source bundle: {bundle_path}')
          PY

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifacts
          if-no-files-found: warn
          path: |
            pytest-report.xml
            coverage.xml
            dist/tui-k6-runner-source.zip

      - name: Fail workflow if any stage failed
        if: steps.smoke.outcome == 'failure' || steps.lint.outcome == 'failure' || steps.unit_tests.outcome == 'failure' || steps.coverage.outcome == 'failure' || steps.dependency.outcome == 'failure' || steps.test_report.outcome == 'failure' || steps.build.outcome == 'failure'
        run: |
          echo "One or more CI stages failed."
          exit 1
