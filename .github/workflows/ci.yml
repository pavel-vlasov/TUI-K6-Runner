name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check .

      - name: Run tests with coverage
        id: pytest
        continue-on-error: true
        run: |
          set -o pipefail
          PYTHONPATH=. pytest \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=markdown-append:${GITHUB_STEP_SUMMARY} \
            --junitxml=pytest-report.xml | tee pytest-output.txt

      - name: Build test summary
        if: always()
        run: |
          python - <<'PY'
          import os
          import xml.etree.ElementTree as ET
          from pathlib import Path

          report = Path("pytest-report.xml")
          coverage_report = Path("coverage.xml")
          summary_file = os.environ.get("GITHUB_STEP_SUMMARY")
          if not summary_file:
              raise SystemExit(0)
          summary_path = Path(summary_file)

          if not report.exists():
              summary_path.write_text("## Pytest summary\n\n⚠️ `pytest-report.xml` was not generated.\n", encoding="utf-8")
              raise SystemExit(0)

          root = ET.parse(report).getroot()
          suite = root if root.tag == "testsuite" else root.find("testsuite")
          if suite is None:
              summary_path.write_text("## Pytest summary\n\n⚠️ Unable to parse testsuite from junit report.\n", encoding="utf-8")
              raise SystemExit(0)

          total = int(suite.attrib.get("tests", 0))
          failures = int(suite.attrib.get("failures", 0))
          errors = int(suite.attrib.get("errors", 0))
          skipped = int(suite.attrib.get("skipped", 0))
          passed = total - failures - errors - skipped

          coverage_line = "- 📊 Coverage: **n/a**"
          if coverage_report.exists():
              cov_root = ET.parse(coverage_report).getroot()
              rate = float(cov_root.attrib.get("line-rate", 0.0))
              coverage_line = f"- 📊 Coverage: **{rate * 100:.2f}%**"

          lines = [
              "## Pytest summary",
              "",
              f"- ✅ Passed: **{passed}**",
              f"- ❌ Failed: **{failures}**",
              f"- 💥 Errors: **{errors}**",
              f"- ⏭️ Skipped: **{skipped}**",
              f"- 🔢 Total: **{total}**",
              coverage_line,
              "",
          ]

          failed_items = []
          for case in suite.findall("testcase"):
              node = case.find("failure") or case.find("error")
              if node is None:
                  continue
              name = f"{case.attrib.get('classname', '')}::{case.attrib.get('name', '')}".strip(":")
              text = (node.text or node.attrib.get("message") or "No details provided.").strip()
              failed_items.append((name, text))

          if failed_items:
              lines.append("### Failed test details")
              lines.append("")
              for name, text in failed_items:
                  clipped = text[:4000]
                  lines.append(f"<details><summary><code>{name}</code></summary>")
                  lines.append("")
                  lines.append("```text")
                  lines.append(clipped)
                  lines.append("```")
                  lines.append("</details>")
                  lines.append("")

          summary_path.parent.mkdir(parents=True, exist_ok=True)
          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8") if not summary_path.exists() else summary_path.write_text(summary_path.read_text(encoding="utf-8") + "\n" + "\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Upload pytest artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: |
            pytest-report.xml
            pytest-output.txt
            coverage.xml

      - name: Fail job when tests failed
        if: steps.pytest.outcome == 'failure'
        run: |
          echo "Pytest reported failures. See summary and artifacts above."
          exit 1
