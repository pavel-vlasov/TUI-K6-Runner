name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff lint
        id: ruff
        continue-on-error: true
        run: |
          set -o pipefail
          ruff check . | tee ruff-output.txt

      - name: Compile check
        id: compile
        continue-on-error: true
        run: |
          set -o pipefail
          python -m compileall -q . 2>&1 | tee compile-output.txt

      - name: Build source bundle
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          python - <<'PY' 2>&1 | tee build-output.txt
          from pathlib import Path
          import zipfile

          project_root = Path('.')
          dist_dir = project_root / 'dist'
          dist_dir.mkdir(parents=True, exist_ok=True)
          bundle_path = dist_dir / 'tui-k6-runner-source.zip'

          include_suffixes = {'.py', '.tcss', '.md', '.txt', '.js', '.yml'}
          excluded_parts = {'.git', '.pytest_cache', '__pycache__', '.ruff_cache', 'dist'}

          with zipfile.ZipFile(bundle_path, 'w', compression=zipfile.ZIP_DEFLATED) as bundle:
              for path in project_root.rglob('*'):
                  if not path.is_file():
                      continue
                  if any(part in excluded_parts for part in path.parts):
                      continue
                  if path.suffix.lower() not in include_suffixes:
                      continue
                  bundle.write(path, arcname=path.as_posix())

          print(f'Built source bundle: {bundle_path}')
          PY

      - name: Run tests with coverage
        id: pytest
        continue-on-error: true
        run: |
          set -o pipefail
          PYTHONPATH=. pytest \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --junitxml=pytest-report.xml | tee pytest-output.txt

      - name: Build job summary (lint + compile + build + tests + coverage)
        if: always()
        env:
          SUMMARY_FILE: ${{ env.GITHUB_STEP_SUMMARY }}
          RUFF_OUTCOME: ${{ steps.ruff.outcome }}
          COMPILE_OUTCOME: ${{ steps.compile.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
        run: |
          python - <<'PY'
          import os
          import xml.etree.ElementTree as ET
          from pathlib import Path

          summary_file = os.environ.get("GITHUB_STEP_SUMMARY") or os.environ.get("SUMMARY_FILE")
          if not summary_file:
              raise SystemExit(0)

          summary_path = Path(summary_file)
          report = Path("pytest-report.xml")
          coverage_report = Path("coverage.xml")

          lines = ["## Quality summary", ""]

          checks = [
              ("Ruff lint", os.environ.get("RUFF_OUTCOME", "unknown"), Path("ruff-output.txt")),
              ("Compile check", os.environ.get("COMPILE_OUTCOME", "unknown"), Path("compile-output.txt")),
              ("Build", os.environ.get("BUILD_OUTCOME", "unknown"), Path("build-output.txt")),
          ]

          for title, outcome, output_file in checks:
              if outcome == "success":
                  lines.append(f"- ✅ {title}: **passed**")
              elif outcome == "failure":
                  lines.append(f"- ❌ {title}: **failed**")
              else:
                  lines.append(f"- ⚠️ {title}: **{outcome}**")

              if output_file.exists():
                  content = output_file.read_text(encoding="utf-8", errors="replace").strip()
                  if content:
                      lines.extend(
                          [
                              "",
                              f"<details><summary><code>{title} output</code></summary>",
                              "",
                              "```text",
                              content[:4000],
                              "```",
                              "</details>",
                              "",
                          ]
                      )

          lines.extend(["", "## Test summary", ""])

          if report.exists():
              root = ET.parse(report).getroot()
              suites = [root] if root.tag == "testsuite" else root.findall("testsuite")

              total = failures = errors = skipped = 0
              failed_items = []

              for suite in suites:
                  total += int(suite.attrib.get("tests", 0))
                  failures += int(suite.attrib.get("failures", 0))
                  errors += int(suite.attrib.get("errors", 0))
                  skipped += int(suite.attrib.get("skipped", 0))

                  for case in suite.findall("testcase"):
                      node = case.find("failure") or case.find("error")
                      if node is None:
                          continue
                      name = f"{case.attrib.get('classname', '')}::{case.attrib.get('name', '')}".strip(":")
                      text = (node.text or node.attrib.get("message") or "No details provided.").strip()
                      failed_items.append((name, text))

              passed = total - failures - errors - skipped

              lines.extend(
                  [
                      f"- ✅ Passed: **{passed}**",
                      f"- ❌ Failed: **{failures}**",
                      f"- 💥 Errors: **{errors}**",
                      f"- ⏭️ Skipped: **{skipped}**",
                      f"- 🔢 Total: **{total}**",
                  ]
              )

              if failed_items:
                  lines.extend(["", "### Failed test details", ""])
                  for name, text in failed_items:
                      clipped = text[:4000]
                      lines.extend(
                          [
                              f"<details><summary><code>{name}</code></summary>",
                              "",
                              "```text",
                              clipped,
                              "```",
                              "</details>",
                              "",
                          ]
                      )
          else:
              lines.append("⚠️ `pytest-report.xml` was not generated.")

          lines.extend(["", "## Coverage summary", ""])
          if coverage_report.exists():
              cov_root = ET.parse(coverage_report).getroot()
              line_rate = float(cov_root.attrib.get("line-rate", 0.0)) * 100
              branch_rate = float(cov_root.attrib.get("branch-rate", 0.0)) * 100
              lines.append(f"- 📊 Line coverage: **{line_rate:.2f}%**")
              lines.append(f"- 🌿 Branch coverage: **{branch_rate:.2f}%**")
          else:
              lines.append("⚠️ `coverage.xml` was not generated.")

          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          print(f"Job summary written to {summary_path}")
          PY

      - name: Upload pytest artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          if-no-files-found: warn
          path: |
            pytest-report.xml
            pytest-output.txt
            ruff-output.txt
            compile-output.txt
            build-output.txt
            coverage.xml
            dist/tui-k6-runner-source.zip

      - name: Fail job when any quality gate failed
        if: steps.pytest.outcome == 'failure' || steps.ruff.outcome == 'failure' || steps.compile.outcome == 'failure' || steps.build.outcome == 'failure'
        run: |
          echo "One or more quality checks failed (ruff/compile/build/pytest). See summary and artifacts above."
          exit 1
