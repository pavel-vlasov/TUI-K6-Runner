name: Quality Pipeline

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  lock-toolchain-smoke:
    name: Lock toolchain smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-lock-tools.txt

      - name: Install canonical lock toolchain
        run: |
          python -m pip install --upgrade -r requirements-lock-tools.txt

      - name: Print lock toolchain versions
        run: |
          python -m pip --version
          pip-compile --version

      - name: Smoke compile lock files
        run: |
          ./scripts/update-dependencies.sh

      - name: Verify lock files are stable
        run: |
          ./scripts/update-dependencies.sh --normalize-only requirements.txt requirements-dev.txt
          git diff -- requirements.txt requirements-dev.txt
          git diff --exit-code -- requirements.txt requirements-dev.txt

  lint:
    name: Lint
    runs-on: ubuntu-latest
    outputs:
      lint_artifact_url: ${{ steps.upload_lint_report.outputs.artifact-url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements-dev.txt

      - name: Ruff lint check
        id: ruff_lint
        run: |
          set +e
          ruff check . 2>&1 | tee lint-report.txt
          ruff_exit_code=${PIPESTATUS[0]}
          echo "exit_code=${ruff_exit_code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload lint report artifact
        id: upload_lint_report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          if-no-files-found: warn
          path: lint-report.txt

      - name: Fail lint stage if Ruff found issues
        if: steps.ruff_lint.outputs.exit_code != '0'
        run: |
          echo "Ruff found lint issues."
          exit 1

  tests-smoke:
    name: Smoke tests (quick gate)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements-dev.txt

      - name: Smoke tests
        env:
          PYTHONPATH: .
        run: |
          pytest -q tests/test_process_manager.py tests/test_k6_service.py

  tests:
    name: Tests ${{ matrix.name }}
    needs: tests-smoke
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Ubuntu
          - os: windows-latest
            name: Windows
          - os: macos-latest
            name: macOS

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        # Tests run against the dev lockfile to keep toolchain and pytest deps reproducible across OS matrix.
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements-dev.txt

      - name: Run tests and build JUnit report
        env:
          PYTHONPATH: .
        run: |
          pytest -q --junitxml=pytest-report.xml

      - name: Upload test report artifact
        id: upload_test_report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report-${{ matrix.os }}
          if-no-files-found: warn
          path: pytest-report.xml

      - name: Save test report direct link metadata
        if: always()
        env:
          TEST_ARTIFACT_URL: ${{ steps.upload_test_report.outputs.artifact-url }}
        run: |
          printf '%s' "${TEST_ARTIFACT_URL:-}" > "test-artifact-url-${{ matrix.os }}.txt"

      - name: Upload test report metadata artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifact-url-${{ matrix.os }}
          if-no-files-found: warn
          path: test-artifact-url-${{ matrix.os }}.txt

  tests-summary:
    name: Tests Summary
    if: always()
    needs:
      - tests-smoke
      - tests
    runs-on: ubuntu-latest

    steps:
      - name: Check upstream test jobs
        env:
          TESTS_SMOKE_RESULT: ${{ needs.tests-smoke.result }}
          TESTS_MATRIX_RESULT: ${{ needs.tests.result }}
        run: |
          echo "tests-smoke: ${TESTS_SMOKE_RESULT}"
          echo "tests-matrix: ${TESTS_MATRIX_RESULT}"
          if [ "${TESTS_SMOKE_RESULT}" != "success" ] || [ "${TESTS_MATRIX_RESULT}" != "success" ]; then
            echo "Tests stage failed."
            exit 1
          fi

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    outputs:
      coverage_artifact_url: ${{ steps.upload_coverage_report.outputs.artifact-url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements-dev.txt

      - name: Coverage report
        env:
          PYTHONPATH: .
        run: |
          pytest --cov=. --cov-config=.coveragerc --cov-report=xml:coverage.xml --cov-report=term-missing || true
          python - <<'PY'
          import xml.etree.ElementTree as ET

          threshold = 80.0
          tree = ET.parse("coverage.xml")
          root = tree.getroot()
          line_rate = float(root.attrib["line-rate"])
          coverage_pct = line_rate * 100

          print(f"Total coverage: {coverage_pct:.2f}% (threshold: {threshold:.2f}%)")
          if coverage_pct < threshold:
              raise SystemExit(1)
          PY

      - name: Upload coverage artifact
        id: upload_coverage_report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          if-no-files-found: warn
          path: coverage.xml

  security:
    name: Security
    runs-on: ubuntu-latest
    outputs:
      security_artifact_url: ${{ steps.upload_security_report.outputs.artifact-url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit bandit

      - name: Dependency check (runtime)
        run: |
          pip-audit --require-hashes -r requirements.txt 2>&1 | tee security-runtime-report.txt

      - name: Dependency check (dev)
        run: |
          pip-audit --require-hashes -r requirements-dev.txt 2>&1 | tee security-dev-report.txt

      - name: Static security scan (Bandit)
        run: |
          BANDIT_BASELINE_ARGS=""
          if [ -f .bandit-baseline.json ]; then
            BANDIT_BASELINE_ARGS="--baseline .bandit-baseline.json"
          fi
          # Fail on high-severity + high-confidence issues; allow temporary, explicit baseline if present.
          # `.bandit` is discovered automatically by Bandit's INI config loader.
          bandit -r . -f txt -o security-bandit-report.txt -lll -iii ${BANDIT_BASELINE_ARGS}

      - name: Upload security report artifact
        id: upload_security_report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          if-no-files-found: warn
          path: |
            security-runtime-report.txt
            security-dev-report.txt
            security-bandit-report.txt

  quality-summary:
    name: Quality summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - lock-toolchain-smoke
      - lint
      - tests-smoke
      - tests
      - tests-summary
      - coverage
      - security

    steps:
      - name: Download test report metadata artifacts
        if: always()
        uses: actions/download-artifact@v4
        with:
          pattern: test-artifact-url-*
          path: test-artifact-metadata
          merge-multiple: false

      - name: Build pipeline summary
        env:
          LOCK_TOOLCHAIN_RESULT: ${{ needs.lock-toolchain-smoke.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          SMOKE_RESULT: ${{ needs.tests-smoke.result }}
          TESTS_RESULT: ${{ needs.tests.result }}
          COVERAGE_RESULT: ${{ needs.coverage.result }}
          SECURITY_RESULT: ${{ needs.security.result }}
          LINT_ARTIFACT_URL: ${{ needs.lint.outputs.lint_artifact_url }}
          COVERAGE_ARTIFACT_URL: ${{ needs.coverage.outputs.coverage_artifact_url }}
          SECURITY_ARTIFACT_URL: ${{ needs.security.outputs.security_artifact_url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          tests_result_display="$TESTS_RESULT"
          tests_failed="false"
          if [ "$TESTS_RESULT" != "success" ]; then
            if [ "$SMOKE_RESULT" = "success" ] || [ "$TESTS_RESULT" != "skipped" ]; then
              tests_failed="true"
            else
              tests_result_display="skipped (blocked by smoke failure)"
            fi
          fi

          overall="passed"
          if [ "$LOCK_TOOLCHAIN_RESULT" != "success" ] || [ "$LINT_RESULT" != "success" ] || [ "$SMOKE_RESULT" != "success" ] || [ "$tests_failed" = "true" ] || [ "$COVERAGE_RESULT" != "success" ] || [ "$SECURITY_RESULT" != "success" ]; then
            overall="failed"
          fi

          lint_report_link="${LINT_ARTIFACT_URL:-not available}"
          if [ "$lint_report_link" != "not available" ]; then
            lint_report_link="[lint-report]($lint_report_link)"
          fi

          get_test_artifact_url() {
            local os_name="$1"
            local path="test-artifact-metadata/test-artifact-url-${os_name}/test-artifact-url-${os_name}.txt"
            if [ -f "$path" ]; then
              local url
              url="$(cat "$path")"
              if [ -n "$url" ]; then
                echo "$url"
                return
              fi
            fi
            echo ""
          }

          ubuntu_test_url="$(get_test_artifact_url "ubuntu-latest")"
          windows_test_url="$(get_test_artifact_url "windows-latest")"
          macos_test_url="$(get_test_artifact_url "macos-latest")"

          tests_report_link="ubuntu: not available<br>windows: not available<br>macos: not available"
          [ -n "$ubuntu_test_url" ] && ubuntu_test_link="[pytest-report-ubuntu-latest]($ubuntu_test_url)" || ubuntu_test_link="not available"
          [ -n "$windows_test_url" ] && windows_test_link="[pytest-report-windows-latest]($windows_test_url)" || windows_test_link="not available"
          [ -n "$macos_test_url" ] && macos_test_link="[pytest-report-macos-latest]($macos_test_url)" || macos_test_link="not available"
          tests_report_link="ubuntu: $ubuntu_test_link<br>windows: $windows_test_link<br>macos: $macos_test_link"

          coverage_report_link="${COVERAGE_ARTIFACT_URL:-not available}"
          if [ "$coverage_report_link" != "not available" ]; then
            coverage_report_link="[coverage-report]($coverage_report_link)"
          fi

          security_report_link="${SECURITY_ARTIFACT_URL:-not available}"
          if [ "$security_report_link" != "not available" ]; then
            security_report_link="[security-report]($security_report_link)"
          fi

          {
            echo "# Quality Pipeline"
            echo
            echo "**Report badge status:** $overall"
            echo
            echo "| Stage | Status | Report |"
            echo "|---|---|---|"
            echo "| Lint | $LINT_RESULT | [Artifacts on run page]($RUN_URL) — `lint-report` |"
            echo "| Smoke | $SMOKE_RESULT | [Open run logs]($RUN_URL) |"
            echo "| Tests (matrix) | $tests_result_display | $tests_report_link |"
            echo "| Coverage | $COVERAGE_RESULT | [Artifacts on run page]($RUN_URL) — `coverage-report` |"
            echo "| Security | $SECURITY_RESULT | [Artifacts on run page]($RUN_URL) — `security-report` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail summary job when any stage failed
        env:
          LOCK_TOOLCHAIN_RESULT: ${{ needs.lock-toolchain-smoke.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          SMOKE_RESULT: ${{ needs.tests-smoke.result }}
          TESTS_RESULT: ${{ needs.tests.result }}
          COVERAGE_RESULT: ${{ needs.coverage.result }}
          SECURITY_RESULT: ${{ needs.security.result }}
        run: |
          tests_failed="false"
          if [ "$TESTS_RESULT" != "success" ]; then
            if [ "$SMOKE_RESULT" = "success" ] || [ "$TESTS_RESULT" != "skipped" ]; then
              tests_failed="true"
            fi
          fi

          if [ "$LOCK_TOOLCHAIN_RESULT" != "success" ] || [ "$LINT_RESULT" != "success" ] || [ "$SMOKE_RESULT" != "success" ] || [ "$tests_failed" = "true" ] || [ "$COVERAGE_RESULT" != "success" ] || [ "$SECURITY_RESULT" != "success" ]; then
            echo "Quality Pipeline failed"
            exit 1
          fi
