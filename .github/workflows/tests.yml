name: Tests

on:
  workflow_dispatch:

jobs:
  smoke:
    name: Smoke tests (quick gate)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        # Tests run against the dev lockfile to keep toolchain and pytest deps reproducible across jobs.
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements-dev.txt

      - name: Smoke tests
        env:
          PYTHONPATH: .
        run: |
          pytest -q tests/test_process_manager.py tests/test_k6_service.py

  tests:
    name: Unit tests (${{ matrix.os }})
    needs: smoke
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements-dev.txt

      - name: Run unit tests and build JUnit report
        env:
          PYTHONPATH: .
        run: |
          pytest -q --junitxml=pytest-report.xml

      - name: Upload test report artifact
        id: upload_test_report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report-${{ matrix.os }}
          if-no-files-found: warn
          path: pytest-report.xml

      - name: Publish tests summary
        if: always()
        env:
          JUNIT_ARTIFACT_URL: ${{ steps.upload_test_report.outputs.artifact-url }}
        run: |
          {
            echo "### Test job (${{ matrix.os }})"
            echo
            echo "- Smoke gate: \\`needs.smoke\\`"
            if [ -n "$JUNIT_ARTIFACT_URL" ]; then
              echo "- JUnit artifact: [pytest-report-${{ matrix.os }}]($JUNIT_ARTIFACT_URL)"
            else
              echo "- JUnit artifact: \\`pytest-report-${{ matrix.os }}\\` (artifact URL unavailable; see run artifacts section)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
