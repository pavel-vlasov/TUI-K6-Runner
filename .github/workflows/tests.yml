name: Tests

on:
  workflow_dispatch:

jobs:
  smoke:
    name: Smoke tests (quick gate)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        # Tests run against the dev lockfile to keep toolchain and pytest deps reproducible across jobs.
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements-dev.txt

      - name: Smoke tests
        env:
          PYTHONPATH: .
        run: |
          pytest -q tests/test_process_manager.py tests/test_k6_service.py

  tests:
    name: Unit tests (${{ matrix.os }})
    needs: smoke
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements-dev.txt

      - name: Run unit tests and build JUnit report
        env:
          PYTHONPATH: .
        run: |
          pytest -q --junitxml=pytest-report.xml

      - name: Upload test report artifact
        id: upload_report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report-${{ matrix.os }}
          if-no-files-found: warn
          path: pytest-report.xml

      - name: Publish tests summary
        if: always()
        env:
          SMOKE_GATE: ${{ needs.smoke.result }}
          ARTIFACT_NAME: pytest-report-${{ matrix.os }}
          ARTIFACT_URL: ${{ steps.upload_report.outputs.artifact-url }}
        run: |
          md_cell() {
            local value="${1-}"
            if [[ -z "$value" ]]; then
              printf '%s' 'N/A'
              return
            fi
            value="${value//$'\n'/ }"
            value="${value//|/\\|}"
            value="${value//`/\\`}"
            printf '%s' "$value"
          }

          smoke_gate="$(md_cell "$SMOKE_GATE")"
          artifact_name="$(md_cell "$ARTIFACT_NAME")"

          if [[ -n "${ARTIFACT_URL:-}" ]]; then
            artifact_url="$(md_cell "$ARTIFACT_URL")"
            junit_artifact="[${artifact_name}](${artifact_url})"
          else
            junit_artifact="$artifact_name"
          fi

          {
            echo "### Test job (${{ matrix.os }})"
            echo
            echo "| Check | Value |"
            echo "| --- | --- |"
            echo "| Smoke gate | ${smoke_gate} |"
            echo "| JUnit artifact | ${junit_artifact} |"
          } >> "$GITHUB_STEP_SUMMARY"
